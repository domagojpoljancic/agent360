<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Agent360">
  <defs>
    <linearGradient id="a360i-orbit" x1="14%" y1="10%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#5DC2A8" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#3694FC"/>
      <stop offset="100%" stop-color="#7DB6FE"/>
    </linearGradient>
    <linearGradient id="a360i-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ECEFF"/>
      <stop offset="100%" stop-color="#3694FC"/>
    </linearGradient>
    <radialGradient id="a360i-halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3694FC" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#5DC2A8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3694FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ambient field -->
  <circle cx="32" cy="32" r="29" fill="url(#a360i-halo)"/>
  <!-- 360 orbit ring -->
  <circle
    cx="32"
    cy="32"
    r="26"
    fill="none"
    stroke="url(#a360i-orbit)"
    stroke-width="2"
    stroke-dasharray="44 26"
    stroke-linecap="round"
    opacity="0.96"
    transform="rotate(-24 32 32)"
  />
  <!-- Inner telemetry ring -->
  <circle cx="32" cy="32" r="19.5" fill="none" stroke="#3694FC" stroke-opacity="0.22" stroke-width="1"/>
  <!-- Radar sweep trace (command-center) -->
  <path
    d="M 32 32 L 32 11.5 A 20.5 20.5 0 0 1 48.4 21.8"
    fill="none"
    stroke="#7DB6FE"
    stroke-width="1.35"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.42"
  />
  <!-- Lens / scope ring -->
  <circle
    cx="32"
    cy="32"
    r="11.2"
    fill="rgba(54,148,252,0.11)"
    stroke="#3694FC"
    stroke-opacity="0.5"
    stroke-width="1.1"
  />
  <!-- Central agent node -->
  <circle cx="32" cy="32" r="7.2" fill="url(#a360i-core)"/>
  <circle cx="32" cy="32" r="3.25" fill="#1a1a22"/>
  <!-- Signal nodes -->
  <circle cx="32" cy="6" r="2" fill="#7DB6FE" opacity="0.9"/>
  <circle cx="56.2" cy="33.5" r="1.85" fill="#3694FC" opacity="0.62"/>
  <circle cx="26.5" cy="57.2" r="1.75" fill="#3694FC" opacity="0.52"/>
  <circle cx="7.2" cy="27.5" r="1.75" fill="#3694FC" opacity="0.48"/>
  <!-- Live / healthy pulse -->
  <circle cx="51.5" cy="15.5" r="2.15" fill="#3DD68C"/>
</svg>
