<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 72" role="img" aria-label="Agent360">
  <defs>
    <linearGradient id="lo-orbit" x1="14%" y1="10%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#4BAFA0" stop-opacity="0.98"/>
      <stop offset="42%" stop-color="#1B6AE8"/>
      <stop offset="100%" stop-color="#4A9DFF"/>
    </linearGradient>
    <linearGradient id="lo-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DB6FE"/>
      <stop offset="100%" stop-color="#1B6AE8"/>
    </linearGradient>
    <radialGradient id="lo-halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1B6AE8" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#4BAFA0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1B6AE8" stop-opacity="0"/>
    </radialGradient>
    <filter id="lo-paper" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feMorphology in="SourceAlpha" operator="dilate" radius="0.35" result="spread"/>
      <feFlood flood-color="#17171F" flood-opacity="0.14" result="ink"/>
      <feComposite in="ink" in2="spread" operator="in" result="outline"/>
      <feGaussianBlur in="outline" stdDeviation="0.35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#lo-paper)" transform="translate(8 8)">
    <g transform="translate(4 4)">
      <svg width="48" height="48" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="29" fill="url(#lo-halo)"/>
        <circle
          cx="32"
          cy="32"
          r="26"
          fill="none"
          stroke="url(#lo-orbit)"
          stroke-width="2.15"
          stroke-dasharray="44 26"
          stroke-linecap="round"
          opacity="0.98"
          transform="rotate(-24 32 32)"
        />
        <circle cx="32" cy="32" r="19.5" fill="none" stroke="#1B6AE8" stroke-opacity="0.38" stroke-width="1.1"/>
        <path
          d="M 32 32 L 32 11.5 A 20.5 20.5 0 0 1 48.4 21.8"
          fill="none"
          stroke="#3D8AE8"
          stroke-width="1.45"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.58"
        />
        <circle
          cx="32"
          cy="32"
          r="11.2"
          fill="rgba(27,106,232,0.14)"
          stroke="#1B6AE8"
          stroke-opacity="0.72"
          stroke-width="1.15"
        />
        <circle cx="32" cy="32" r="7.2" fill="url(#lo-core)"/>
        <circle cx="32" cy="32" r="3.25" fill="#17171F"/>
        <circle cx="32" cy="6" r="2" fill="#4A9DFF" opacity="0.95"/>
        <circle cx="56.2" cy="33.5" r="1.85" fill="#1B6AE8" opacity="0.72"/>
        <circle cx="26.5" cy="57.2" r="1.75" fill="#1B6AE8" opacity="0.62"/>
        <circle cx="7.2" cy="27.5" r="1.75" fill="#1B6AE8" opacity="0.58"/>
        <circle cx="51.5" cy="15.5" r="2.15" fill="#24B26A"/>
      </svg>
    </g>
    <text
      x="60"
      y="37.5"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
      font-size="23"
      font-weight="600"
      letter-spacing="-0.03em"
    >
      <tspan fill="#17171F" stroke="rgba(23,23,31,0.18)" stroke-width="0.5" paint-order="stroke fill">Agent</tspan><tspan fill="#1B6AE8" stroke="rgba(23,23,31,0.14)" stroke-width="0.45" paint-order="stroke fill">360</tspan>
    </text>
  </g>
</svg>
